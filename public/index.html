<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mad Lib Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Create Your Mad Lib Story</h1>
    <form id="madLibForm">
        <label for="noun">Enter a noun:</label>
        <input type="text" id="noun" name="noun" required>

        <label for="verb">Enter a verb:</label>
        <input type="text" id="verb" name="verb" required>

        <label for="adjective">Enter an adjective:</label>
        <input type="text" id="adjective" name="adjective" required>

        <label for="place">Enter a place:</label>
        <input type="text" id="place" name="place" required>

        <label for="pluralNoun">Enter a plural noun:</label>
        <input type="text" id="pluralNoun" name="pluralNoun" required>

        <input type="submit" value="Create Story">
    </form>

    <div id="storyContainer" style="display: none;">
        <h2>Your Mad Lib Story</h2>
        <p id="storyText"></p>
        <button id="resetButton">Create Another Story</button>
    </div>

    <footer>
        <p>Last updated: <span id="lastModified"></span></p>
        <p><strong>Addendum:</strong> This page allows you to create a fun, creative story based on the inputs you provide. Enjoy crafting your unique tale!</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
